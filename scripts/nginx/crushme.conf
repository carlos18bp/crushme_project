server {
    listen 80;
    server_name crushme.co www.crushme.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name crushme.co www.crushme.co;

    ssl_certificate /etc/letsencrypt/live/crushme.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crushme.co/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location /static/ {
        alias /home/ryzepeck/webapps/crushme_project/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/ryzepeck/webapps/crushme_project/backend/media/;
        expires 7d;
    }

    location /api/ {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=api burst=10 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }

    location / {
        include /etc/nginx/snippets/geo-block.conf;
        limit_req zone=general burst=20 nodelay;
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn.sock;
    }
}
